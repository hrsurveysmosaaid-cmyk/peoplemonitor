version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: peopleos_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: peopleos_db
      MYSQL_USER: peopleos_user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - peopleos_network

  # Node.js Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peopleos_backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: peopleos_user
      DB_PASSWORD: user_password
      DB_NAME: peopleos_db
      SERVER_PORT: 5000
      SERVER_HOST: 0.0.0.0
      CORS_ORIGIN: https://peopleos.online
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - peopleos_network
    command: npm run dev

volumes:
  mysql_data:
    driver: local

networks:
  peopleos_network:
    driver: bridge
